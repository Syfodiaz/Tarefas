<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloco de Tarefas · Flag, Data, Diário & Nuvem</title>
  
  <!-- Firebase SDK (versão 12.12.1 compatível com seu snippet) -->
  <script type="module">
    // Importações necessárias
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    // SUAS CONFIGURAÇÕES DO FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyAG5eguIlQJjLpxxKqXAza6eTPGhdiXkI4",
      authDomain: "tarefas-bb.firebaseapp.com",
      projectId: "tarefas-bb",
      storageBucket: "tarefas-bb.firebasestorage.app",
      messagingSenderId: "294624314400",
      appId: "1:294624314400:web:ae129240648326e3796845",
      measurementId: "G-R6V9G1WGB4"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Disponibilizar globalmente
    window.firebaseApp = app;
    window.firebaseAuth = auth;
    window.firebaseDb = db;
  </script>
  
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
      transition: background-color 0.2s, border-color 0.2s;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
      background: #f4f7fc;
      color: #1e293b;
    }
    body.dark-mode {
      background: #0f172a;
      color: #e2e8f0;
    }
    .app-container {
      max-width: 1000px;
      width: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      padding: 24px 28px;
    }
    body.dark-mode .app-container {
      background: #1e293b;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }
    h1 {
      font-weight: 600;
      font-size: 2rem;
      margin-top: 0;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }
    .subtitle {
      color: #475569;
      margin-top: -8px;
      margin-bottom: 20px;
      border-left: 4px solid #3b82f6;
      padding-left: 16px;
      font-weight: 400;
    }
    body.dark-mode .subtitle {
      color: #94a3b8;
    }
    .add-section {
      background: #f8fafc;
      padding: 18px 20px;
      border-radius: 20px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      border: 1px solid #e2e8f0;
    }
    body.dark-mode .add-section {
      background: #0f172a;
      border-color: #334155;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      flex: 2 1 200px;
    }
    .input-group label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #475569;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    body.dark-mode .input-group label {
      color: #94a3b8;
    }
    .input-group input {
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      font-size: 1rem;
      background: white;
    }
    body.dark-mode .input-group input {
      background: #1e293b;
      border-color: #475569;
      color: #f1f5f9;
    }
    .input-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    button {
      background: #3b82f6;
      border: none;
      color: white;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 8px rgba(59,130,246,0.2);
    }
    button:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }
    button.secondary {
      background: white;
      color: #1e293b;
      border: 1px solid #cbd5e1;
      box-shadow: none;
    }
    body.dark-mode button.secondary {
      background: #334155;
      color: #e2e8f0;
      border-color: #475569;
    }
    button.secondary:hover {
      background: #f1f5f9;
    }
    body.dark-mode button.secondary:hover {
      background: #475569;
    }
    button.small {
      padding: 6px 12px;
      font-size: 0.85rem;
    }
    .view-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: #f1f5f9;
      padding: 6px;
      border-radius: 48px;
      width: fit-content;
    }
    body.dark-mode .view-toggle {
      background: #0f172a;
    }
    .view-toggle button {
      background: transparent;
      color: #334155;
      box-shadow: none;
      padding: 8px 18px;
    }
    body.dark-mode .view-toggle button {
      color: #94a3b8;
    }
    .view-toggle button.active {
      background: white;
      color: #1e293b;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    body.dark-mode .view-toggle button.active {
      background: #1e293b;
      color: #f1f5f9;
    }
    .group-header {
      margin-top: 28px;
      margin-bottom: 12px;
      font-weight: 600;
      font-size: 1.4rem;
      color: #0f172a;
      border-bottom: 2px dashed #cbd5e1;
      padding-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    body.dark-mode .group-header {
      color: #f1f5f9;
      border-bottom-color: #475569;
    }
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .task-item {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 12px 16px 12px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }
    body.dark-mode .task-item {
      background: #1e293b;
      border-color: #334155;
    }
    .task-item.done-task {
      background: #fafafa;
      border-color: #e9eef4;
    }
    body.dark-mode .task-item.done-task {
      background: #0f172a;
      border-color: #1e293b;
    }
    .task-check {
      transform: scale(1.2);
      accent-color: #3b82f6;
      width: 20px;
      height: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .task-description {
      font-weight: 500;
      color: #0f172a;
      word-break: break-word;
    }
    body.dark-mode .task-description {
      color: #f1f5f9;
    }
    .task-item.done-task .task-description {
      color: #6b7280;
      text-decoration: line-through;
      font-weight: 400;
    }
    body.dark-mode .task-item.done-task .task-description {
      color: #64748b;
    }
    .task-item:not(.done-task) .task-description {
      font-weight: 700;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px 16px;
      margin-top: 4px;
      font-size: 0.8rem;
      color: #64748b;
    }
    body.dark-mode .task-meta {
      color: #94a3b8;
    }
    .task-group-badge {
      background: #eef2ff;
      color: #2563eb;
      padding: 2px 10px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.75rem;
    }
    body.dark-mode .task-group-badge {
      background: #1e3a8a;
      color: #bfdbfe;
    }
    .completion-date {
      font-family: monospace;
      background: #f1f5f9;
      padding: 2px 8px;
      border-radius: 20px;
    }
    body.dark-mode .completion-date {
      background: #334155;
      color: #cbd5e1;
    }
    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .task-actions button {
      padding: 6px 10px;
      background: transparent;
      color: #334155;
      box-shadow: none;
      border: 1px solid #e2e8f0;
      font-size: 0.9rem;
    }
    body.dark-mode .task-actions button {
      color: #cbd5e1;
      border-color: #475569;
    }
    .task-actions button:hover {
      background: #f1f5f9;
    }
    body.dark-mode .task-actions button:hover {
      background: #334155;
    }
    .empty-message {
      color: #64748b;
      font-style: italic;
      padding: 30px;
      text-align: center;
    }
    .footer-bar {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      color: #64748b;
      font-size: 0.85rem;
      border-top: 1px solid #e2e8f0;
      padding-top: 16px;
      gap: 15px;
    }
    body.dark-mode .footer-bar {
      color: #94a3b8;
      border-top-color: #334155;
    }
    .import-export {
      display: flex;
      gap: 8px;
    }
    .reset-btn {
      background: none;
      border: 1px solid #fecaca;
      color: #b91c1c;
      box-shadow: none;
    }
    body.dark-mode .reset-btn {
      border-color: #7f1d1d;
      color: #fca5a5;
    }
    .reset-btn:hover {
      background: #fee2e2;
    }
    body.dark-mode .reset-btn:hover {
      background: #450a0a;
    }
    .file-input {
      display: none;
    }
    .sync-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #themeToggle {
      background: none;
      border: 1px solid #cbd5e1;
      color: #1e293b;
      box-shadow: none;
      padding: 8px 12px;
    }
    body.dark-mode #themeToggle {
      border-color: #475569;
      color: #f1f5f9;
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>
    <span>📋 Bloco de Tarefas</span>
    <div class="header-actions">
      <button id="themeToggle" class="small" title="Alternar tema">🌙 Escuro</button>
    </div>
  </h1>
  <div class="subtitle">⚑ Flag · Diário automático · ☁️ Sincronizado com Firebase</div>

  <div class="view-toggle">
    <button id="viewGroupsBtn" class="active">📂 Agrupar por Grupo</button>
    <button id="viewDaysBtn">📅 Agrupar por Dia de Conclusão</button>
  </div>

  <div class="add-section">
    <div class="input-group">
      <label>📝 Descrição</label>
      <input type="text" id="taskDescInput" placeholder="Ex: Finalizar relatório..." autocomplete="off">
    </div>
    <div class="input-group">
      <label>📂 Grupo (opcional)</label>
      <input type="text" id="taskGroupInput" placeholder="Trabalho, Pessoal..." list="groupSuggestions" autocomplete="off">
      <datalist id="groupSuggestions"></datalist>
    </div>
    <button id="addTaskBtn">➕ Adicionar</button>
  </div>

  <div id="groupsContainer"></div>

  <div class="footer-bar">
    <div class="sync-status">
      <span id="syncIcon">☁️</span>
      <span id="syncText">Conectando...</span>
    </div>
    <div class="import-export">
      <button class="small secondary" id="exportBtn">📤 Exportar JSON</button>
      <button class="small secondary" id="importBtn">📥 Importar JSON</button>
      <input type="file" id="fileInput" accept=".json,application/json" class="file-input">
      <button class="small reset-btn" id="resetAllBtn">🗑️ Limpar tudo</button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    const STORAGE_KEY = 'taskBlockApp_v3';
    const USE_FIREBASE = true;
    
    let tasks = [];
    let currentView = 'groups';
    let darkMode = false;
    let firestoreUnsubscribe = null;
    let currentUser = null;
    let isOnline = navigator.onLine;
    
    const TASKS_DOC_ID = 'user_tasks';

    const taskDescInput = document.getElementById('taskDescInput');
    const taskGroupInput = document.getElementById('taskGroupInput');
    const addBtn = document.getElementById('addTaskBtn');
    const groupsContainer = document.getElementById('groupsContainer');
    const groupDatalist = document.getElementById('groupSuggestions');
    const viewGroupsBtn = document.getElementById('viewGroupsBtn');
    const viewDaysBtn = document.getElementById('viewDaysBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const fileInput = document.getElementById('fileInput');
    const resetBtn = document.getElementById('resetAllBtn');
    const themeToggle = document.getElementById('themeToggle');
    const syncIcon = document.getElementById('syncIcon');
    const syncText = document.getElementById('syncText');

    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        darkMode = true;
        document.body.classList.add('dark-mode');
        themeToggle.innerHTML = '☀️ Claro';
      } else if (savedTheme === 'light') {
        darkMode = false;
        document.body.classList.remove('dark-mode');
        themeToggle.innerHTML = '🌙 Escuro';
      } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        darkMode = prefersDark;
        if (prefersDark) {
          document.body.classList.add('dark-mode');
          themeToggle.innerHTML = '☀️ Claro';
        } else {
          themeToggle.innerHTML = '🌙 Escuro';
        }
      }
    }

    function toggleTheme() {
      darkMode = !darkMode;
      if (darkMode) {
        document.body.classList.add('dark-mode');
        themeToggle.innerHTML = '☀️ Claro';
        localStorage.setItem('theme', 'dark');
      } else {
        document.body.classList.remove('dark-mode');
        themeToggle.innerHTML = '🌙 Escuro';
        localStorage.setItem('theme', 'light');
      }
    }

    async function initFirebase() {
      if (!USE_FIREBASE) return;
      
      try {
        const auth = window.firebaseAuth;
        const db = window.firebaseDb;
        
        await signInAnonymously(auth);
        
        onAuthStateChanged(auth, (user) => {
          currentUser = user;
          if (user) {
            updateSyncStatus(true, 'Conectado ☁️');
            setupFirestoreListener(user.uid);
          } else {
            updateSyncStatus(false, 'Offline (login falhou)');
            loadFromLocalStorage();
          }
        });
      } catch (error) {
        console.warn('Firebase indisponível, usando localStorage:', error);
        updateSyncStatus(false, 'Modo offline');
        loadFromLocalStorage();
      }
    }

    function setupFirestoreListener(uid) {
      const db = window.firebaseDb;
      const docRef = doc(db, 'tasks', uid);
      
      firestoreUnsubscribe = onSnapshot(docRef, (docSnap) => {
        if (docSnap.exists()) {
          const data = docSnap.data();
          if (data.tasks && Array.isArray(data.tasks)) {
            tasks = data.tasks.map(t => ({
              id: t.id || Date.now() + Math.random(),
              description: t.description || 'sem descrição',
              group: t.group || 'Geral',
              done: t.done || false,
              completedDate: t.completedDate || null
            }));
          } else {
            tasks = [];
          }
        } else {
          tasks = [];
          saveToFirestore();
        }
        
        saveToLocalStorage();
        renderTasks();
        updateSyncStatus(true, 'Sincronizado ☁️');
      }, (error) => {
        console.error('Erro no listener Firestore:', error);
        updateSyncStatus(false, 'Erro na sincronização');
        loadFromLocalStorage();
      });
    }

    async function saveToFirestore() {
      if (!currentUser || !USE_FIREBASE) return;
      
      try {
        const db = window.firebaseDb;
        const docRef = doc(db, 'tasks', currentUser.uid);
        await setDoc(docRef, { tasks: tasks }, { merge: true });
        updateSyncStatus(true, 'Salvo na nuvem ☁️');
      } catch (error) {
        console.error('Erro ao salvar no Firestore:', error);
        updateSyncStatus(false, 'Erro ao salvar');
        saveToLocalStorage();
      }
    }

    function updateSyncStatus(online, message) {
      isOnline = online;
      syncIcon.textContent = online ? '☁️' : '📶';
      syncText.textContent = message;
    }

    function loadFromLocalStorage() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          tasks = JSON.parse(stored);
        } catch(e) {
          tasks = [];
        }
      } else {
        tasks = [
          { id: Date.now() - 300000, description: 'Estudar documentação', group: 'Trabalho', done: false, completedDate: null },
          { id: Date.now() - 400000, description: 'Comprar mantimentos', group: 'Pessoal', done: true, completedDate: new Date().toLocaleString() },
          { id: Date.now() - 200000, description: 'Agendar reunião', group: 'Trabalho', done: true, completedDate: new Date(Date.now() - 86400000).toLocaleString() },
        ];
      }
      renderTasks();
    }

    function saveToLocalStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function saveData() {
      saveToLocalStorage();
      if (USE_FIREBASE && currentUser) {
        saveToFirestore();
      }
    }

    function updateGroupDatalist() {
      const groups = [...new Set(tasks.map(t => t.group).filter(g => g && g.trim() !== ''))];
      groupDatalist.innerHTML = '';
      groups.sort((a,b) => a.localeCompare(b));
      groups.forEach(g => {
        const option = document.createElement('option');
        option.value = g;
        groupDatalist.appendChild(option);
      });
    }

    function renderTasks() {
      if (!groupsContainer) return;
      if (tasks.length === 0) {
        groupsContainer.innerHTML = `<div class="empty-message">✨ Nenhuma tarefa. Adicione uma acima.</div>`;
        updateGroupDatalist();
        return;
      }

      let html = '';
      if (currentView === 'groups') {
        html = renderByGroups();
      } else {
        html = renderByDays();
      }

      groupsContainer.innerHTML = html;
      updateGroupDatalist();
      attachTaskEventListeners();
    }

    function renderByGroups() {
      const groupsMap = new Map();
      tasks.forEach(task => {
        const group = task.group?.trim() || 'Geral';
        if (!groupsMap.has(group)) groupsMap.set(group, []);
        groupsMap.get(group).push(task);
      });

      const sortedGroups = Array.from(groupsMap.keys()).sort((a,b) => {
        if (a === 'Geral') return 1;
        if (b === 'Geral') return -1;
        return a.localeCompare(b);
      });

      let html = '';
      sortedGroups.forEach(groupName => {
        const groupTasks = groupsMap.get(groupName);
        groupTasks.sort((a,b) => a.done - b.done);

        html += `<div class="group-header">📌 ${escapeHtml(groupName)} <span style="font-size:0.9rem; font-weight:normal;">(${groupTasks.length})</span></div>`;
        html += `<div class="task-list">`;
        groupTasks.forEach(task => html += renderTaskItem(task));
        html += `</div>`;
      });
      return html;
    }

    function renderByDays() {
      const pending = tasks.filter(t => !t.done);
      const doneTasks = tasks.filter(t => t.done && t.completedDate);
      
      const daysMap = new Map();
      doneTasks.forEach(task => {
        const datePart = task.completedDate.split(',')[0]?.trim() || 'Data desconhecida';
        if (!daysMap.has(datePart)) daysMap.set(datePart, []);
        daysMap.get(datePart).push(task);
      });

      const sortedDays = Array.from(daysMap.keys()).sort((a,b) => {
        const parseDate = (str) => {
          const parts = str.split('/');
          if (parts.length === 3) return new Date(`${parts[1]}/${parts[0]}/${parts[2]}`);
          return new Date(str);
        };
        return parseDate(b) - parseDate(a);
      });

      let html = '';
      if (pending.length > 0) {
        html += `<div class="group-header">⏳ Pendentes <span style="font-size:0.9rem; font-weight:normal;">(${pending.length})</span></div>`;
        html += `<div class="task-list">`;
        pending.sort((a,b) => a.description.localeCompare(b.description));
        pending.forEach(task => html += renderTaskItem(task));
        html += `</div>`;
      }

      sortedDays.forEach(day => {
        const dayTasks = daysMap.get(day);
        dayTasks.sort((a,b) => a.group.localeCompare(b.group) || a.description.localeCompare(b.description));
        html += `<div class="group-header">📅 ${escapeHtml(day)} <span style="font-size:0.9rem; font-weight:normal;">(${dayTasks.length})</span></div>`;
        html += `<div class="task-list">`;
        dayTasks.forEach(task => html += renderTaskItem(task));
        html += `</div>`;
      });

      return html || `<div class="empty-message">✨ Nenhuma tarefa registrada.</div>`;
    }

    function renderTaskItem(task) {
      const doneClass = task.done ? 'done-task' : '';
      const checkedAttr = task.done ? 'checked' : '';
      const completedDateDisplay = task.completedDate ? `✅ ${escapeHtml(task.completedDate)}` : '⏳ Pendente';
      
      return `
        <div class="task-item ${doneClass}" data-task-id="${task.id}">
          <input type="checkbox" class="task-check" ${checkedAttr} data-id="${task.id}">
          <div class="task-content">
            <span class="task-description">${escapeHtml(task.description)}</span>
            <div class="task-meta">
              <span class="task-group-badge">📂 ${escapeHtml(task.group)}</span>
              <span class="completion-date">${completedDateDisplay}</span>
            </div>
          </div>
          <div class="task-actions">
            <button class="duplicate-btn small" data-id="${task.id}">🔁 Duplicar</button>
            <button class="delete-btn small" data-id="${task.id}">🗑️</button>
          </div>
        </div>
      `;
    }

    function escapeHtml(text) {
      if (!text) return text;
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function attachTaskEventListeners() {
      document.querySelectorAll('.task-check').forEach(cb => {
        cb.removeEventListener('change', handleCheckboxChange);
        cb.addEventListener('change', handleCheckboxChange);
      });
      document.querySelectorAll('.duplicate-btn').forEach(btn => {
        btn.removeEventListener('click', handleDuplicate);
        btn.addEventListener('click', handleDuplicate);
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.removeEventListener('click', handleDelete);
        btn.addEventListener('click', handleDelete);
      });
    }

    function handleCheckboxChange(e) {
      const taskId = Number(e.target.dataset.id);
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      task.done = e.target.checked;
      task.completedDate = task.done ? new Date().toLocaleString() : null;
      saveData();
      renderTasks();
    }

    function handleDuplicate(e) {
      const taskId = Number(e.currentTarget.dataset.id);
      const original = tasks.find(t => t.id === taskId);
      if (!original) return;
      const newTask = {
        ...original,
        id: Date.now() + Math.floor(Math.random() * 1000),
        done: false,
        completedDate: null
      };
      tasks.push(newTask);
      saveData();
      renderTasks();
    }

    function handleDelete(e) {
      const taskId = Number(e.currentTarget.dataset.id);
      tasks = tasks.filter(t => t.id !== taskId);
      saveData();
      renderTasks();
    }

    function addNewTask() {
      const description = taskDescInput.value.trim();
      if (!description) {
        alert('Descreva a tarefa.');
        return;
      }
      let group = taskGroupInput.value.trim() || 'Geral';
      
      const newTask = {
        id: Date.now() + Math.floor(Math.random() * 1000),
        description,
        group,
        done: false,
        completedDate: null
      };
      tasks.push(newTask);
      saveData();
      taskDescInput.value = '';
      taskGroupInput.value = '';
      taskDescInput.focus();
      renderTasks();
    }

    function exportData() {
      const dataStr = JSON.stringify(tasks, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `tarefas_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            tasks = imported.map(t => ({
              id: t.id || Date.now() + Math.random(),
              description: t.description || 'importada',
              group: t.group || 'Geral',
              done: t.done || false,
              completedDate: t.completedDate || null
            }));
            saveData();
            renderTasks();
            alert('Importação concluída!');
          } else {
            alert('Arquivo inválido.');
          }
        } catch (ex) {
          alert('Erro ao ler JSON.');
        }
      };
      reader.readAsText(file);
    }

    function resetAllData() {
      if (confirm('Apagar TODAS as tarefas?')) {
        tasks = [];
        saveData();
        renderTasks();
      }
    }

    function setView(view) {
      currentView = view;
      viewGroupsBtn.classList.toggle('active', view === 'groups');
      viewDaysBtn.classList.toggle('active', view === 'days');
      renderTasks();
    }

    addBtn.addEventListener('click', addNewTask);
    taskDescInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); addNewTask(); } });
    taskGroupInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); addNewTask(); } });
    
    viewGroupsBtn.addEventListener('click', () => setView('groups'));
    viewDaysBtn.addEventListener('click', () => setView('days'));
    
    exportBtn.addEventListener('click', exportData);
    importBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      if (fileInput.files.length > 0) {
        importData(fileInput.files[0]);
        fileInput.value = '';
      }
    });
    
    resetBtn.addEventListener('click', resetAllData);
    themeToggle.addEventListener('click', toggleTheme);

    window.addEventListener('online', () => {
      updateSyncStatus(true, 'Online ☁️');
      if (USE_FIREBASE && currentUser) {
        saveToFirestore();
      }
    });
    window.addEventListener('offline', () => {
      updateSyncStatus(false, 'Offline');
    });

    initTheme();
    initFirebase();
    
    setTimeout(() => {
      if (!currentUser && USE_FIREBASE) {
        updateSyncStatus(false, 'Modo offline (local)');
        loadFromLocalStorage();
      }
    }, 3000);
  })();
</script>
</body>
</html>
