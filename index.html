<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloco de Tarefas</title>
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      createUserWithEmailAndPassword, 
      signOut, 
      onAuthStateChanged,
      updateProfile 
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAG5eguIlQJjLpxxKqXAza6eTPGhdiXkI4",
      authDomain: "tarefas-bb.firebaseapp.com",
      projectId: "tarefas-bb",
      storageBucket: "tarefas-bb.firebasestorage.app",
      messagingSenderId: "294624314400",
      appId: "1:294624314400:web:ae129240648326e3796845",
      measurementId: "G-R6V9G1WGB4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.firebaseAuth = auth;
    window.firebaseDb = db;
  </script>
  
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
      transition: background-color 0.2s, border-color 0.2s;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      background: #f4f7fc;
      color: #1e293b;
    }

    body.dark-mode {
      background: #0f172a;
      color: #e2e8f0;
    }

    .app-container, .login-container {
      max-width: 1000px;
      width: 100%;
      background: white;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      padding: 20px 18px;
      margin: 0 auto;
    }

    body.dark-mode .app-container,
    body.dark-mode .login-container {
      background: #1e293b;
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }

    .login-container {
      max-width: 450px;
    }

    h1 {
      font-weight: 600;
      font-size: 1.8rem;
      margin-top: 0;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    @media (max-width: 600px) {
      body {
        padding: 6px;
        align-items: flex-start;
      }
      
      .app-container, .login-container {
        padding: 14px 10px;
        border-radius: 20px;
      }
      
      h1 {
        font-size: 1.5rem;
      }
      
      .header-actions {
        margin-left: 0;
        width: 100%;
        justify-content: space-between;
      }
      
      .user-info {
        font-size: 0.85rem;
      }
      
      .subtitle {
        font-size: 0.85rem;
      }
      
      .add-section {
        padding: 12px;
        gap: 8px;
      }
      
      .input-group {
        width: 100%;
      }
      
      .input-group input {
        padding: 10px 12px;
      }
      
      .add-section button {
        width: 100%;
        justify-content: center;
        margin-top: 4px;
      }
      
      .view-toggle {
        width: 100%;
      }
      
      .view-toggle button {
        flex: 1;
        text-align: center;
        padding: 8px 12px;
      }
      
      .group-header {
        font-size: 1.2rem;
        margin-top: 20px;
      }
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .subtitle {
      color: #475569;
      margin-top: -8px;
      margin-bottom: 20px;
      border-left: 4px solid #3b82f6;
      padding-left: 16px;
      font-weight: 400;
    }

    body.dark-mode .subtitle {
      color: #94a3b8;
    }

    .add-section {
      background: #f8fafc;
      padding: 16px;
      border-radius: 20px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      border: 1px solid #e2e8f0;
    }

    body.dark-mode .add-section {
      background: #0f172a;
      border-color: #334155;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      flex: 2 1 200px;
    }

    .input-group label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #475569;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    body.dark-mode .input-group label {
      color: #94a3b8;
    }

    .input-group input {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      font-size: 1rem;
      background: white;
    }

    body.dark-mode .input-group input {
      background: #1e293b;
      border-color: #475569;
      color: #f1f5f9;
    }

    .input-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    button {
      background: #3b82f6;
      border: none;
      color: white;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 4px 8px rgba(59,130,246,0.2);
      min-height: 44px;
    }

    button:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    button.secondary {
      background: white;
      color: #1e293b;
      border: 1px solid #cbd5e1;
      box-shadow: none;
    }

    body.dark-mode button.secondary {
      background: #334155;
      color: #e2e8f0;
      border-color: #475569;
    }

    button.secondary:hover {
      background: #f1f5f9;
    }

    body.dark-mode button.secondary:hover {
      background: #475569;
    }

    button.small {
      padding: 8px 14px;
      font-size: 0.9rem;
    }

    .view-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: #f1f5f9;
      padding: 6px;
      border-radius: 48px;
      width: fit-content;
    }

    body.dark-mode .view-toggle {
      background: #0f172a;
    }

    .view-toggle button {
      background: transparent;
      color: #334155;
      box-shadow: none;
      padding: 10px 18px;
    }

    body.dark-mode .view-toggle button {
      color: #94a3b8;
    }

    .view-toggle button.active {
      background: white;
      color: #1e293b;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    body.dark-mode .view-toggle button.active {
      background: #1e293b;
      color: #f1f5f9;
    }

    .group-header {
      margin-top: 28px;
      margin-bottom: 12px;
      font-weight: 600;
      font-size: 1.4rem;
      color: #0f172a;
      border-bottom: 2px dashed #cbd5e1;
      padding-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    body.dark-mode .group-header {
      color: #f1f5f9;
      border-bottom-color: #475569;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 12px 14px 12px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
      transition: opacity 0.2s, border-color 0.2s;
      user-select: none;
    }

    body.dark-mode .task-item {
      background: #1e293b;
      border-color: #334155;
    }

    .task-item.dragging {
      opacity: 0.5;
    }

    .task-item.drag-over {
      border-color: #3b82f6;
      border-width: 2px;
      background: #f0f7ff;
    }

    body.dark-mode .task-item.drag-over {
      border-color: #60a5fa;
      background: #1e3a5f;
    }

    .task-item.done-task {
      background: #fafafa;
      border-color: #e9eef4;
    }

    body.dark-mode .task-item.done-task {
      background: #0f172a;
      border-color: #1e293b;
    }

    .drag-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      color: #94a3b8;
      font-size: 1.2rem;
      cursor: grab;
      flex-shrink: 0;
      margin-top: 2px;
      user-select: none;
      border-radius: 4px;
    }

    .drag-handle:hover {
      background: #e2e8f0;
      color: #475569;
    }

    body.dark-mode .drag-handle {
      color: #64748b;
    }

    body.dark-mode .drag-handle:hover {
      background: #334155;
      color: #cbd5e1;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .task-check {
      transform: scale(1.2);
      accent-color: #3b82f6;
      width: 20px;
      height: 20px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .task-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    .task-description {
      font-weight: 500;
      color: #0f172a;
      word-break: break-word;
    }

    body.dark-mode .task-description {
      color: #f1f5f9;
    }

    .task-item.done-task .task-description {
      color: #6b7280;
      text-decoration: line-through;
      font-weight: 400;
    }

    body.dark-mode .task-item.done-task .task-description {
      color: #64748b;
    }

    .task-item:not(.done-task) .task-description {
      font-weight: 700;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px 12px;
      margin-top: 4px;
      font-size: 0.75rem;
      color: #64748b;
      pointer-events: none;
    }

    body.dark-mode .task-meta {
      color: #94a3b8;
    }

    .task-group-badge {
      background: #eef2ff;
      color: #2563eb;
      padding: 2px 8px;
      border-radius: 30px;
      font-weight: 500;
      font-size: 0.7rem;
    }

    body.dark-mode .task-group-badge {
      background: #1e3a8a;
      color: #bfdbfe;
    }

    .completion-date {
      font-family: monospace;
      background: #f1f5f9;
      padding: 2px 8px;
      border-radius: 20px;
    }

    body.dark-mode .completion-date {
      background: #334155;
      color: #cbd5e1;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .task-actions button {
      padding: 6px 10px;
      background: transparent;
      color: #334155;
      box-shadow: none;
      border: 1px solid #e2e8f0;
      font-size: 0.85rem;
      pointer-events: auto;
    }

    body.dark-mode .task-actions button {
      color: #cbd5e1;
      border-color: #475569;
    }

    .task-actions button:hover {
      background: #f1f5f9;
    }

    body.dark-mode .task-actions button:hover {
      background: #334155;
    }

    @media (max-width: 480px) {
      .task-item {
        flex-wrap: wrap;
      }
      
      .task-actions {
        width: 100%;
        justify-content: flex-end;
        margin-top: 4px;
      }
      
      .task-actions button {
        flex: 1;
      }
    }

    .empty-message {
      color: #64748b;
      font-style: italic;
      padding: 30px;
      text-align: center;
    }

    .footer-bar {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      color: #64748b;
      font-size: 0.85rem;
      border-top: 1px solid #e2e8f0;
      padding-top: 16px;
      gap: 15px;
    }

    body.dark-mode .footer-bar {
      color: #94a3b8;
      border-top-color: #334155;
    }

    .import-export {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media (max-width: 600px) {
      .footer-bar {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }
      
      .import-export {
        justify-content: center;
      }
      
      .import-export button {
        flex: 1;
      }
      
      .sync-status {
        justify-content: center;
      }
    }

    .reset-btn {
      background: none;
      border: 1px solid #fecaca;
      color: #b91c1c;
      box-shadow: none;
    }

    body.dark-mode .reset-btn {
      border-color: #7f1d1d;
      color: #fca5a5;
    }

    .reset-btn:hover {
      background: #fee2e2;
    }

    body.dark-mode .reset-btn:hover {
      background: #450a0a;
    }

    .file-input {
      display: none;
    }

    .sync-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #themeToggle {
      background: none;
      border: 1px solid #cbd5e1;
      color: #1e293b;
      box-shadow: none;
      padding: 8px 12px;
    }

    body.dark-mode #themeToggle {
      border-color: #475569;
      color: #f1f5f9;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .login-tabs {
      display: flex;
      margin-bottom: 20px;
      border-bottom: 1px solid #e2e8f0;
    }

    .login-tab {
      background: none;
      border: none;
      color: #64748b;
      font-weight: 500;
      padding: 10px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .login-tab.active {
      color: #3b82f6;
      border-bottom-color: #3b82f6;
    }

    .error-message {
      color: #dc2626;
      font-size: 0.9rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div id="appRoot"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword, 
    signOut, 
    onAuthStateChanged,
    updateProfile 
  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAG5eguIlQJjLpxxKqXAza6eTPGhdiXkI4",
    authDomain: "tarefas-bb.firebaseapp.com",
    projectId: "tarefas-bb",
    storageBucket: "tarefas-bb.firebasestorage.app",
    messagingSenderId: "294624314400",
    appId: "1:294624314400:web:ae129240648326e3796845",
    measurementId: "G-R6V9G1WGB4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ---------- ESTADO GLOBAL ----------
  let currentUser = null;
  let tasks = [];
  let currentView = 'groups';
  let darkMode = false;
  let firestoreUnsubscribe = null;
  const STORAGE_KEY = 'taskBlockApp_v7';

  // ---------- FUNÇÕES DE SINCRONIZAÇÃO ----------
  function saveToLocalStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function loadFromLocalStorage() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try { tasks = JSON.parse(stored); } catch(e) { tasks = []; }
    }
    if (typeof renderTaskList === 'function') renderTaskList();
  }

  async function saveToFirestore() {
    if (!currentUser) return;
    try {
      const docRef = doc(db, 'tasks', currentUser.uid);
      await setDoc(docRef, { tasks: tasks }, { merge: true });
      updateSyncStatus(true, 'Salvo na nuvem');
    } catch (error) {
      console.error('Erro ao salvar:', error);
      updateSyncStatus(false, 'Erro ao salvar');
    }
  }

  function saveData() {
    saveToLocalStorage();
    if (currentUser) saveToFirestore();
  }

  function setupFirestoreListener(uid) {
    const docRef = doc(db, 'tasks', uid);
    if (firestoreUnsubscribe) firestoreUnsubscribe();
    firestoreUnsubscribe = onSnapshot(docRef, (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        if (data.tasks && Array.isArray(data.tasks)) {
          tasks = data.tasks.map(t => ({
            id: t.id || Date.now() + Math.random(),
            description: t.description || 'sem descrição',
            group: t.group || 'Geral',
            done: t.done || false,
            completedDate: t.completedDate || null,
            order: t.order ?? 0
          }));
        } else tasks = [];
      } else tasks = [];
      // garantir que todas as tarefas tenham order
      tasks.forEach((t, idx) => { if (t.order === undefined) t.order = idx; });
      saveToLocalStorage();
      if (typeof renderTaskList === 'function') renderTaskList();
      updateSyncStatus(true, 'Conectado');
    }, (error) => {
      console.error('Erro no Firestore:', error);
      updateSyncStatus(false, 'Erro na sincronização');
      loadFromLocalStorage();
    });
  }

  function updateSyncStatus(online, message) {
    const syncIcon = document.getElementById('syncIcon');
    const syncText = document.getElementById('syncText');
    if (syncIcon && syncText) {
      syncIcon.textContent = online ? '☁️' : '📶';
      syncText.textContent = message;
    }
  }

  // ---------- TELA DE LOGIN ----------
  function renderLogin() {
    const root = document.getElementById('appRoot');
    root.innerHTML = `
      <div class="login-container">
        <h1>📋 Bloco de Tarefas</h1>
        <div class="subtitle">Faça login para sincronizar suas tarefas</div>
        <div class="login-tabs">
          <button class="login-tab active" data-tab="login">Entrar</button>
          <button class="login-tab" data-tab="register">Criar conta</button>
        </div>
        <form id="loginForm">
          <div class="input-group" style="margin-bottom: 16px;">
            <label>Email</label>
            <input type="email" id="loginEmail" required>
          </div>
          <div class="input-group" style="margin-bottom: 20px;">
            <label>Senha</label>
            <input type="password" id="loginPassword" required minlength="6">
          </div>
          <div id="loginError" class="error-message"></div>
          <button type="submit" id="loginSubmitBtn" style="width: 100%;">Entrar</button>
        </form>
        <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
          Ou <a href="#" id="skipLoginBtn" style="color: #3b82f6;">continuar offline</a>
        </p>
      </div>
    `;
    
    const tabBtns = root.querySelectorAll('.login-tab');
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('loginEmail');
    const passInput = document.getElementById('loginPassword');
    const submitBtn = document.getElementById('loginSubmitBtn');
    const errorDiv = document.getElementById('loginError');
    const skipBtn = document.getElementById('skipLoginBtn');
    
    let currentMode = 'login';
    
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.tab;
        submitBtn.textContent = currentMode === 'login' ? 'Entrar' : 'Criar conta';
      });
    });
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const pass = passInput.value;
      errorDiv.textContent = '';
      try {
        if (currentMode === 'login') {
          await signInWithEmailAndPassword(auth, email, pass);
        } else {
          await createUserWithEmailAndPassword(auth, email, pass);
        }
      } catch (err) {
        errorDiv.textContent = err.message;
      }
    });
    
    skipBtn.addEventListener('click', (e) => {
      e.preventDefault();
      currentUser = null;
      loadFromLocalStorage();
      renderApp();
    });
  }

  // ---------- APLICATIVO PRINCIPAL ----------
  function renderApp() {
    const root = document.getElementById('appRoot');
    root.innerHTML = `
      <div class="app-container">
        <h1>
          <span>📋 Bloco de Tarefas</span>
          <div class="header-actions">
            <div class="user-info">
              <span id="userDisplayName">${currentUser?.displayName || currentUser?.email || 'Modo offline'}</span>
              ${currentUser ? '<button id="editProfileBtn" class="small secondary" style="margin-left:6px;" title="Editar nome">✏️</button>' : ''}
              ${currentUser ? '<button id="logoutBtn" class="small secondary">Sair</button>' : ''}
            </div>
            <button id="themeToggle" class="small" title="Alternar tema">🌙 Escuro</button>
          </div>
        </h1>
        <div class="subtitle">Diário automático · ✋ Arraste pelas 3 barrinhas para reordenar</div>
        
        <div class="view-toggle">
          <button id="viewGroupsBtn" class="active">📂 Agrupar por Grupo</button>
          <button id="viewDaysBtn">📅 Agrupar por Dia de Conclusão</button>
        </div>
        
        <div class="add-section">
          <div class="input-group">
            <label>📝 Descrição</label>
            <input type="text" id="taskDescInput" placeholder="Ex: Finalizar relatório..." autocomplete="off">
          </div>
          <div class="input-group">
            <label>📂 Grupo (opcional)</label>
            <input type="text" id="taskGroupInput" placeholder="Trabalho, Pessoal..." list="groupSuggestions" autocomplete="off">
            <datalist id="groupSuggestions"></datalist>
          </div>
          <button id="addTaskBtn">➕ Adicionar</button>
        </div>
        
        <div id="groupsContainer"></div>
        
        <div class="footer-bar">
          <div class="sync-status">
            <span id="syncIcon">☁️</span>
            <span id="syncText">Conectando...</span>
          </div>
          <div class="import-export">
            <button class="small secondary" id="exportBtn">📤 Exportar JSON</button>
            <button class="small secondary" id="importBtn">📥 Importar JSON</button>
            <input type="file" id="fileInput" accept=".json,application/json" class="file-input">
            <button class="small reset-btn" id="resetAllBtn">🗑️ Limpar tudo</button>
          </div>
        </div>
      </div>
    `;
    
    initTheme();
    
    const taskDescInput = document.getElementById('taskDescInput');
    const taskGroupInput = document.getElementById('taskGroupInput');
    const addBtn = document.getElementById('addTaskBtn');
    const groupsContainer = document.getElementById('groupsContainer');
    const groupDatalist = document.getElementById('groupSuggestions');
    const viewGroupsBtn = document.getElementById('viewGroupsBtn');
    const viewDaysBtn = document.getElementById('viewDaysBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const fileInput = document.getElementById('fileInput');
    const resetBtn = document.getElementById('resetAllBtn');
    const themeToggle = document.getElementById('themeToggle');
    const logoutBtn = document.getElementById('logoutBtn');
    const editProfileBtn = document.getElementById('editProfileBtn');
    
    // Drag and Drop state
    let dragSourceElement = null;
    let dragSourceTaskId = null;
    
    function escapeHtml(text) {
      if (!text) return text;
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function updateGroupDatalist() {
      const groups = [...new Set(tasks.map(t => t.group).filter(g => g && g.trim() !== ''))];
      groupDatalist.innerHTML = '';
      groups.sort((a,b) => a.localeCompare(b));
      groups.forEach(g => {
        const option = document.createElement('option');
        option.value = g;
        groupDatalist.appendChild(option);
      });
    }
    
    function renderTaskItem(task) {
      const doneClass = task.done ? 'done-task' : '';
      const checkedAttr = task.done ? 'checked' : '';
      const completedDateDisplay = task.completedDate ? `✅ ${escapeHtml(task.completedDate)}` : '⏳ Pendente';
      return `
        <div class="task-item ${doneClass}" data-task-id="${task.id}" draggable="true">
          <span class="drag-handle" title="Arraste para reordenar">☰</span>
          <input type="checkbox" class="task-check" ${checkedAttr} data-id="${task.id}">
          <div class="task-content">
            <span class="task-description">${escapeHtml(task.description)}</span>
            <div class="task-meta">
              <span class="task-group-badge">📂 ${escapeHtml(task.group)}</span>
              <span class="completion-date">${completedDateDisplay}</span>
            </div>
          </div>
          <div class="task-actions">
            <button class="duplicate-btn small" data-id="${task.id}">🔁 Duplicar</button>
            <button class="delete-btn small" data-id="${task.id}">🗑️</button>
          </div>
        </div>
      `;
    }
    
    function getSortedTasksForRendering() {
      // Ordenação: pendentes primeiro, depois concluídas; dentro de cada grupo, por order
      return [...tasks].sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        return (a.order ?? 0) - (b.order ?? 0);
      });
    }
    
    function renderByGroups() {
      const sortedTasks = getSortedTasksForRendering();
      const groupsMap = new Map();
      sortedTasks.forEach(task => {
        const group = task.group?.trim() || 'Geral';
        if (!groupsMap.has(group)) groupsMap.set(group, []);
        groupsMap.get(group).push(task);
      });
      const sortedGroups = Array.from(groupsMap.keys()).sort((a,b) => a === 'Geral' ? 1 : b === 'Geral' ? -1 : a.localeCompare(b));
      let html = '';
      sortedGroups.forEach(groupName => {
        const groupTasks = groupsMap.get(groupName);
        html += `<div class="group-header">📌 ${escapeHtml(groupName)} <span style="font-size:0.9rem; font-weight:normal;">(${groupTasks.length})</span></div>`;
        html += `<div class="task-list">`;
        groupTasks.forEach(task => html += renderTaskItem(task));
        html += `</div>`;
      });
      return html;
    }
    
    function renderByDays() {
      const sortedTasks = getSortedTasksForRendering();
      const pending = sortedTasks.filter(t => !t.done);
      const doneTasks = sortedTasks.filter(t => t.done && t.completedDate);
      const daysMap = new Map();
      doneTasks.forEach(task => {
        const datePart = task.completedDate.split(',')[0]?.trim() || 'Data desconhecida';
        if (!daysMap.has(datePart)) daysMap.set(datePart, []);
        daysMap.get(datePart).push(task);
      });
      const sortedDays = Array.from(daysMap.keys()).sort((a,b) => {
        const parseDate = (str) => { const parts = str.split('/'); return parts.length === 3 ? new Date(`${parts[1]}/${parts[0]}/${parts[2]}`) : new Date(str); };
        return parseDate(b) - parseDate(a);
      });
      let html = '';
      if (pending.length > 0) {
        html += `<div class="group-header">⏳ Pendentes <span style="font-size:0.9rem; font-weight:normal;">(${pending.length})</span></div>`;
        html += `<div class="task-list">`;
        pending.forEach(task => html += renderTaskItem(task));
        html += `</div>`;
      }
      sortedDays.forEach(day => {
        const dayTasks = daysMap.get(day);
        html += `<div class="group-header">📅 ${escapeHtml(day)} <span style="font-size:0.9rem; font-weight:normal;">(${dayTasks.length})</span></div>`;
        html += `<div class="task-list">`;
        dayTasks.forEach(task => html += renderTaskItem(task));
        html += `</div>`;
      });
      return html || `<div class="empty-message">✨ Nenhuma tarefa registrada.</div>`;
    }
    
    function attachDragDropListeners() {
      const items = document.querySelectorAll('.task-item[draggable="true"]');
      
      items.forEach(item => {
        item.addEventListener('dragstart', handleDragStart);
        item.addEventListener('dragend', handleDragEnd);
        item.addEventListener('dragover', handleDragOver);
        item.addEventListener('dragenter', handleDragEnter);
        item.addEventListener('dragleave', handleDragLeave);
        item.addEventListener('drop', handleDrop);
      });
    }
    
    function handleDragStart(e) {
      // Permitir arrastar apenas se iniciou no handle ou no item inteiro (mas o handle é o ideal)
      const taskElement = e.target.closest('.task-item');
      if (!taskElement) return;
      
      // Verificar se o drag começou no handle (opcional, mas pode ajudar)
      const handle = e.target.closest('.drag-handle');
      if (!handle) {
        // Se não começou no handle, pode cancelar, mas preferimos permitir também.
        // Apenas continue.
      }
      
      dragSourceElement = taskElement;
      dragSourceTaskId = Number(taskElement.dataset.taskId);
      taskElement.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSourceTaskId);
    }
    
    function handleDragEnd(e) {
      const taskElement = e.target.closest('.task-item');
      if (taskElement) taskElement.classList.remove('dragging');
      document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
      dragSourceElement = null;
      dragSourceTaskId = null;
    }
    
    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }
    
    function handleDragEnter(e) {
      e.preventDefault();
      const taskElement = e.target.closest('.task-item');
      if (taskElement && taskElement !== dragSourceElement) {
        taskElement.classList.add('drag-over');
      }
    }
    
    function handleDragLeave(e) {
      const taskElement = e.target.closest('.task-item');
      if (taskElement) taskElement.classList.remove('drag-over');
    }
    
    function handleDrop(e) {
      e.preventDefault();
      const targetElement = e.target.closest('.task-item');
      if (!targetElement || !dragSourceElement || targetElement === dragSourceElement) {
        document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
        return;
      }
      
      const targetTaskId = Number(targetElement.dataset.taskId);
      const sourceTask = tasks.find(t => t.id === dragSourceTaskId);
      const targetTask = tasks.find(t => t.id === targetTaskId);
      
      if (!sourceTask || !targetTask) return;
      
      if (sourceTask.done !== targetTask.done) {
        alert('Só é possível reordenar tarefas do mesmo status (pendentes com pendentes, concluídas com concluídas).');
        document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
        return;
      }
      
      const sameStatusTasks = tasks.filter(t => t.done === sourceTask.done);
      const sourceIndex = sameStatusTasks.findIndex(t => t.id === sourceTask.id);
      const targetIndex = sameStatusTasks.findIndex(t => t.id === targetTask.id);
      
      if (sourceIndex === -1 || targetIndex === -1) return;
      
      sameStatusTasks.splice(sourceIndex, 1);
      sameStatusTasks.splice(targetIndex, 0, sourceTask);
      
      sameStatusTasks.forEach((t, idx) => { t.order = idx; });
      
      const otherStatusTasks = tasks.filter(t => t.done !== sourceTask.done);
      otherStatusTasks.sort((a,b) => (a.order ?? 0) - (b.order ?? 0));
      otherStatusTasks.forEach((t, idx) => { t.order = idx; });
      
      saveData();
      renderTaskList();
      
      document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
    }
    
    function renderTaskList() {
      if (!groupsContainer) return;
      if (tasks.length === 0) {
        groupsContainer.innerHTML = `<div class="empty-message">✨ Nenhuma tarefa. Adicione uma acima.</div>`;
        updateGroupDatalist();
        return;
      }
      let html = currentView === 'groups' ? renderByGroups() : renderByDays();
      groupsContainer.innerHTML = html;
      updateGroupDatalist();
      
      document.querySelectorAll('.task-check').forEach(cb => {
        cb.addEventListener('change', (e) => {
          const taskId = Number(e.target.dataset.id);
          const task = tasks.find(t => t.id === taskId);
          if (!task) return;
          task.done = e.target.checked;
          task.completedDate = task.done ? new Date().toLocaleString() : null;
          if (task.done) {
            const maxOrderDone = Math.max(...tasks.filter(t => t.done).map(t => t.order ?? 0), -1);
            task.order = maxOrderDone + 1;
          } else {
            const maxOrderPending = Math.max(...tasks.filter(t => !t.done).map(t => t.order ?? 0), -1);
            task.order = maxOrderPending + 1;
          }
          saveData();
          renderTaskList();
        });
      });
      document.querySelectorAll('.duplicate-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const taskId = Number(e.currentTarget.dataset.id);
          const original = tasks.find(t => t.id === taskId);
          if (!original) return;
          const newOrder = Math.max(...tasks.filter(t => t.done === original.done).map(t => t.order ?? 0), -1) + 1;
          const newTask = { 
            ...original, 
            id: Date.now() + Math.floor(Math.random() * 1000), 
            done: false, 
            completedDate: null,
            order: newOrder
          };
          tasks.push(newTask);
          saveData();
          renderTaskList();
        });
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const taskId = Number(e.currentTarget.dataset.id);
          tasks = tasks.filter(t => t.id !== taskId);
          ['pending', 'done'].forEach(status => {
            const statusTasks = tasks.filter(t => t.done === (status === 'done'));
            statusTasks.sort((a,b) => (a.order ?? 0) - (b.order ?? 0));
            statusTasks.forEach((t, idx) => { t.order = idx; });
          });
          saveData();
          renderTaskList();
        });
      });
      
      attachDragDropListeners();
    }
    
    function addNewTask() {
      const description = taskDescInput.value.trim();
      if (!description) { alert('Descreva a tarefa.'); return; }
      let group = taskGroupInput.value.trim() || 'Geral';
      const maxOrder = Math.max(...tasks.filter(t => !t.done).map(t => t.order ?? 0), -1);
      const newTask = { 
        id: Date.now() + Math.floor(Math.random() * 1000), 
        description, 
        group, 
        done: false, 
        completedDate: null,
        order: maxOrder + 1
      };
      tasks.push(newTask);
      saveData();
      taskDescInput.value = '';
      taskGroupInput.value = '';
      taskDescInput.focus();
      renderTaskList();
    }
    
    function setView(view) {
      currentView = view;
      viewGroupsBtn.classList.toggle('active', view === 'groups');
      viewDaysBtn.classList.toggle('active', view === 'days');
      renderTaskList();
    }
    
    function exportData() {
      const dataStr = JSON.stringify(tasks, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `tarefas_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function importData(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            tasks = imported.map(t => ({ 
              id: t.id || Date.now(), 
              description: t.description || '', 
              group: t.group || 'Geral', 
              done: t.done || false, 
              completedDate: t.completedDate || null,
              order: t.order ?? 0
            }));
            ['pending', 'done'].forEach(status => {
              const statusTasks = tasks.filter(t => t.done === (status === 'done'));
              statusTasks.sort((a,b) => (a.order ?? 0) - (b.order ?? 0));
              statusTasks.forEach((t, idx) => { t.order = idx; });
            });
            saveData();
            renderTaskList();
            alert('Importação concluída!');
          } else { alert('Arquivo inválido.'); }
        } catch (ex) { alert('Erro ao ler JSON.'); }
      };
      reader.readAsText(file);
    }
    
    function resetAllData() {
      if (confirm('Apagar TODAS as tarefas?')) {
        tasks = [];
        saveData();
        renderTaskList();
      }
    }
    
    addBtn.addEventListener('click', addNewTask);
    taskDescInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); addNewTask(); } });
    taskGroupInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); addNewTask(); } });
    viewGroupsBtn.addEventListener('click', () => setView('groups'));
    viewDaysBtn.addEventListener('click', () => setView('days'));
    exportBtn.addEventListener('click', exportData);
    importBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => { if (fileInput.files.length) { importData(fileInput.files[0]); fileInput.value = ''; } });
    resetBtn.addEventListener('click', resetAllData);
    themeToggle.addEventListener('click', toggleTheme);
    if (logoutBtn) {
      logoutBtn.addEventListener('click', async () => {
        await signOut(auth);
      });
    }
    if (editProfileBtn) {
      editProfileBtn.addEventListener('click', async () => {
        const newName = prompt('Digite seu nome de exibição:', currentUser?.displayName || '');
        if (newName !== null) {
          try {
            await updateProfile(currentUser, { displayName: newName.trim() || null });
            const nameSpan = document.getElementById('userDisplayName');
            if (nameSpan) nameSpan.textContent = newName.trim() || currentUser.email;
            currentUser = auth.currentUser;
          } catch (err) {
            alert('Erro ao atualizar nome: ' + err.message);
          }
        }
      });
    }
    
    window.addEventListener('online', () => { updateSyncStatus(true, 'Online'); if (currentUser) saveToFirestore(); });
    window.addEventListener('offline', () => updateSyncStatus(false, 'Offline'));
    
    renderTaskList();
    updateSyncStatus(!!currentUser, currentUser ? 'Conectado' : 'Modo offline');
    window.renderTaskList = renderTaskList;
  }
  
  function initTheme() {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
      darkMode = true;
      document.body.classList.add('dark-mode');
      const btn = document.getElementById('themeToggle');
      if (btn) btn.innerHTML = '☀️ Claro';
    } else if (saved === 'light') {
      darkMode = false;
      document.body.classList.remove('dark-mode');
    } else {
      const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
      darkMode = prefers;
      if (prefers) document.body.classList.add('dark-mode');
    }
  }
  
  function toggleTheme() {
    darkMode = !darkMode;
    if (darkMode) {
      document.body.classList.add('dark-mode');
      document.getElementById('themeToggle').innerHTML = '☀️ Claro';
      localStorage.setItem('theme', 'dark');
    } else {
      document.body.classList.remove('dark-mode');
      document.getElementById('themeToggle').innerHTML = '🌙 Escuro';
      localStorage.setItem('theme', 'light');
    }
  }

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      setupFirestoreListener(user.uid);
      renderApp();
    } else {
      if (firestoreUnsubscribe) {
        firestoreUnsubscribe();
        firestoreUnsubscribe = null;
      }
      renderLogin();
    }
  });
</script>
</body>
</html>
